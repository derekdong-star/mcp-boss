version: '3.8'

services:
  mcp-boss:
    build: .
    container_name: mcp-boss
    ports:
      - "8000:8000"
    volumes:
      # Persist static files (QR codes)
      - ./static:/app/static
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; socket.create_connection((\"localhost\", 8000), timeout=5)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
